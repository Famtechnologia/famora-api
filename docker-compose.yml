services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: famora-api
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      # DATABASE_URL comes from .env and must point at Postgres. It is not
      # defaulted here: a container-local database loses everything on the
      # next deploy.
    volumes:
      # Persist uploaded files (local fallback)
      - uploads:/app/public
    restart: unless-stopped

volumes:
  uploads:
